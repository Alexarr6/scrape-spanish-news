services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: spain-news-bias-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LOCAL_DB_NAME:-spain_news_bias}
      POSTGRES_USER: ${LOCAL_DB_USER:-spain_news}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:-spain_news_dev}
    ports:
      - "${LOCAL_DB_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  postgres-data:
